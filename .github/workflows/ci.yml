name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # allow manual re-runs

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# PRs from forks run on GitHub-hosted runners (untrusted code stays off the
# project's Blacksmith runners); pushes and same-repo PRs use Blacksmith.

jobs:
  build-test:
    name: build & test
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'ubuntu-24.04-arm' || 'blacksmith-2vcpu-ubuntu-2404-arm' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

  format:
    name: zig fmt
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'ubuntu-24.04-arm' || 'blacksmith-2vcpu-ubuntu-2404-arm' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check .

  web:
    name: web (typecheck & build)
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'ubuntu-24.04-arm' || 'blacksmith-2vcpu-ubuntu-2404-arm' }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build library
        run: npm run build
      - name: Build demo
        run: npm run build:demo
