name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # allow manual re-runs

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    # Skip PRs from forks: they can't access the cache and we don't run untrusted
    # code on our runners. Pushes and same-repo PRs still run.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7.0.0

      # The generator links system zlib via C interop (compress.zig); Linux
      # runners need the dev package for zlib.h.
      - name: Install zlib headers
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

  format:
    name: zig fmt
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check .

  web:
    name: web (typecheck & build)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build library
        run: npm run build
      - name: Build demo
        run: npm run build:demo
