name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # allow manual re-runs (e.g. after a billing fix)

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    # Linux-only to keep private-repo Actions minutes cheap (macOS bills ~10x);
    # the macOS build path is covered by local development.
    steps:
      - uses: actions/checkout@v4

      # The generator links system zlib via C interop (compress.zig); Linux
      # runners need the dev package for zlib.h.
      - name: Install zlib headers
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

  format:
    name: zig fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check .
