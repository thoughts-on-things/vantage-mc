name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # allow manual re-runs

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    # All three OSes are supported targets (vendored C, one static binary per
    # OS), so all three build and test on every change.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test

      - name: Build
        run: zig build

  format:
    name: zig fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check .

  versions:
    name: version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check release versions
        run: node scripts/check-versions.mjs

  web:
    name: web (node ${{ matrix.node }})
    # 18 is the documented floor, 22 the everyday version — test both.
    strategy:
      fail-fast: false
      matrix:
        node: [18, 22]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build library
        run: npm run build
      - name: Build demo
        run: npm run build:demo

  site:
    name: site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            site/package-lock.json
      # The site links vantage-mc from ../web (file:), so the library's dist
      # must exist before the site can typecheck or build.
      - name: Build the vantage-mc library
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Typecheck & build the site
        working-directory: site
        run: |
          npm ci
          npm run ci

  desktop:
    name: desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # The desktop Vite aliases point at ../web/src, whose React and Three.js
      # imports resolve through web/node_modules.
      - name: Install shared web dependencies
        working-directory: web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Check Rust formatting
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: Lint and compile native host
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # Exercise Tauri's production path and the bundled Zig sidecar without
      # spending CI time creating installers; releases build both installers.
      - name: Build desktop app
        working-directory: desktop
        run: npm run desktop:build -- --no-bundle
