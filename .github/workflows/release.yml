name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# A release is not safe to interrupt midway through publishing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    name: Binary (${{ matrix.name }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl, name: vantage-x86_64-linux }
          - { target: aarch64-linux-musl, name: vantage-aarch64-linux }
          - { target: x86_64-macos, name: vantage-x86_64-macos }
          - { target: aarch64-macos, name: vantage-aarch64-macos }
          - { target: x86_64-windows, name: vantage-x86_64-windows }
    steps:
      - uses: actions/checkout@v7

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd zig-out/bin
          case "${{ matrix.target }}" in
            *windows*) zip "$GITHUB_WORKSPACE/${{ matrix.name }}.zip" vantage.exe ;;
            *) tar czf "$GITHUB_WORKSPACE/${{ matrix.name }}.tar.gz" vantage ;;
          esac

      - name: Upload to GitHub release (with retries)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          for attempt in 1 2 3; do
            gh release upload "$TAG_NAME" ${{ matrix.name }}.* --clobber && exit 0
            [ "$attempt" = 3 ] && exit 1
            sleep $((attempt * 10))
          done

  publish-npm:
    name: Publish npm package
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify and build
        run: npm run ci

      - name: Pack release tarball
        run: npm pack

      - name: Generate checksum
        run: sha256sum vantage-mc-*.tgz > SHA256SUMS

      - name: Upload package to GitHub release (with retries)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          for attempt in 1 2 3; do
            gh release upload "$TAG_NAME" vantage-mc-*.tgz SHA256SUMS --clobber && exit 0
            [ "$attempt" = 3 ] && exit 1
            sleep $((attempt * 10))
          done

      # npm publishing uses GitHub Actions trusted publishing (OIDC), so there
      # is no long-lived NPM_TOKEN to rotate. Configure this workflow as a
      # trusted publisher for the package on npmjs.com before the first release.
      - name: Publish to npm (idempotent, with retries)
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          for attempt in 1 2 3; do
            if npm view "vantage-mc@$VERSION" version >/dev/null 2>&1; then
              echo "vantage-mc@$VERSION is already published"
              exit 0
            fi
            npm publish --provenance --access public vantage-mc-*.tgz && exit 0
            [ "$attempt" = 3 ] && exit 1
            sleep $((attempt * 15))
          done
