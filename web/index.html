<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vantage — viewer</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1015; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 12px; left: 12px; padding: 10px 12px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #cfe3ff; background: rgba(12, 16, 22, 0.72);
      border: 1px solid rgba(120, 160, 220, 0.25); border-radius: 8px;
      pointer-events: none; white-space: pre; text-shadow: 0 1px 2px #000;
    }
    /* Biome layer panel */
    #panel {
      position: fixed; top: 12px; right: 12px; width: 224px; max-height: calc(100% - 24px);
      display: none; flex-direction: column; overflow: hidden;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #cfe3ff; background: rgba(12, 16, 22, 0.82);
      border: 1px solid rgba(120, 160, 220, 0.25); border-radius: 8px;
    }
    #panel header {
      padding: 9px 11px; border-bottom: 1px solid rgba(120, 160, 220, 0.18);
      display: flex; align-items: center; gap: 8px; user-select: none;
    }
    #panel header .sw { font-size: 11px; color: #8fb6e8; }
    #toggle {
      margin-left: auto; font-size: 11px; padding: 2px 9px; border-radius: 5px;
      border: 1px solid rgba(120, 160, 220, 0.4); background: rgba(40, 60, 90, 0.5);
      color: #cfe3ff; cursor: pointer;
    }
    #toggle.on { background: #3f76e4; border-color: #3f76e4; color: #fff; }
    #legend { overflow-y: auto; padding: 6px; }
    .row {
      display: flex; align-items: center; gap: 8px; padding: 4px 6px;
      border-radius: 5px; cursor: pointer; white-space: nowrap;
    }
    .row:hover { background: rgba(120, 160, 220, 0.12); }
    .row.sel { background: rgba(63, 118, 228, 0.28); }
    .row.hover { box-shadow: inset 0 0 0 1px rgba(143, 182, 232, 0.7); }
    .row.dim { opacity: 0.4; }
    /* Hover-to-identify tooltip */
    #tip {
      position: fixed; display: none; align-items: center; gap: 7px;
      padding: 5px 9px; pointer-events: none; z-index: 10;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #eaf2ff; background: rgba(12, 16, 22, 0.9);
      border: 1px solid rgba(120, 160, 220, 0.3); border-radius: 6px;
      text-shadow: 0 1px 2px #000;
    }
    .row .chip { width: 13px; height: 13px; border-radius: 3px; flex: none; box-shadow: 0 0 0 1px rgba(0,0,0,0.4); }
    .row .name { overflow: hidden; text-overflow: ellipsis; }
    .row .pct { margin-left: auto; color: #8fb6e8; font-size: 11px; }
    #err {
      position: fixed; inset: 0; display: none; place-content: center;
      font: 14px ui-monospace, monospace; color: #ffb4b4; padding: 2rem; text-align: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">vantage · loading…</div>
  <div id="panel">
    <header>
      <span class="sw">▦ biomes</span>
      <button id="toggle" title="Toggle biome view (B)">off</button>
    </header>
    <div id="legend"></div>
  </div>
  <div id="err"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
