<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vantage — viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(13, 17, 25, 0.66);
      --border: rgba(132, 170, 230, 0.22);
      --accent: #5b9bff;
      --text: #d8e6fc;
      --dim: #8ba6cd;
      --faint: #6f86ab;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      --ease: 0.16s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1015; }
    #app { position: fixed; inset: 0; }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 11px;
      backdrop-filter: blur(13px) saturate(1.25);
      -webkit-backdrop-filter: blur(13px) saturate(1.25);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.32);
    }

    #hud {
      position: fixed; top: 14px; left: 14px; padding: 11px 14px;
      font: 12px/1.5 var(--mono); color: var(--text);
      pointer-events: none; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      animation: rise 0.4s var(--ease) both;
    }
    #hud .title { font-weight: 600; letter-spacing: 0.01em; color: #eef4ff; }
    #hud .title b { color: var(--accent); font-weight: 600; }
    #hud .sub { color: var(--dim); margin-top: 4px; }
    #hud .hint { color: var(--faint); margin-top: 7px; font-size: 11px; }

    /* Biome layer panel */
    #panel {
      position: fixed; top: 14px; right: 14px; width: 232px; max-height: calc(100% - 28px);
      display: none; flex-direction: column; overflow: hidden;
      font: 12px/1.4 var(--mono); color: var(--text);
      animation: rise 0.4s var(--ease) both;
    }
    #panel header {
      padding: 11px 12px 10px; display: flex; align-items: center; gap: 8px;
      user-select: none; border-bottom: 1px solid rgba(132, 170, 230, 0.16);
    }
    #panel header .sw { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--dim); }
    #panel header .sw b { color: #eef4ff; font-weight: 600; }
    #toggle {
      margin-left: auto; font: 11px var(--mono); padding: 3px 11px; border-radius: 999px;
      border: 1px solid rgba(132, 170, 230, 0.38); background: rgba(40, 60, 90, 0.45);
      color: var(--dim); cursor: pointer; transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    #toggle:hover { border-color: rgba(132, 170, 230, 0.7); color: var(--text); }
    #toggle.on { background: var(--accent); border-color: var(--accent); color: #07101f; font-weight: 600; }

    #legend { overflow-y: auto; padding: 7px; scrollbar-width: thin; scrollbar-color: rgba(132,170,230,0.3) transparent; }
    .row {
      display: flex; align-items: center; gap: 9px; padding: 5px 7px;
      border-radius: 6px; cursor: pointer; white-space: nowrap;
      transition: background var(--ease), opacity var(--ease), box-shadow var(--ease);
    }
    .row:hover { background: rgba(132, 170, 230, 0.12); }
    .row.sel { background: rgba(91, 155, 255, 0.26); }
    .row.hover { box-shadow: inset 0 0 0 1px rgba(143, 182, 232, 0.75); }
    .row.dim { opacity: 0.36; }
    .row .chip { width: 13px; height: 13px; border-radius: 4px; flex: none; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45); }
    .row .name { overflow: hidden; text-overflow: ellipsis; }
    .row .pct { margin-left: auto; color: var(--faint); font-size: 11px; font-variant-numeric: tabular-nums; }

    /* Hover-to-identify tooltip */
    #tip {
      position: fixed; display: none; align-items: center; gap: 8px;
      padding: 6px 10px; pointer-events: none; z-index: 10;
      font: 12px/1 var(--mono); color: #eef4ff;
      background: rgba(13, 17, 25, 0.86); border: 1px solid var(--border); border-radius: 7px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }
    #tip .chip { width: 12px; height: 12px; border-radius: 3px; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45); }

    /* Subtle vignette for depth */
    #vignette { position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(120% 120% at 50% 42%, transparent 58%, rgba(0, 0, 0, 0.22) 100%); }

    #err {
      position: fixed; inset: 0; display: none; place-content: center;
      font: 14px var(--mono); color: #ffb4b4; padding: 2rem; text-align: center;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(-7px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>
  <div id="hud" class="glass"><div class="title">vantage · loading…</div></div>
  <div id="panel" class="glass">
    <header>
      <span class="sw">▦ <b>biomes</b></span>
      <button id="toggle" title="Toggle biome view (B)">off</button>
    </header>
    <div id="legend"></div>
  </div>
  <div id="err"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
